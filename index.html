    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #000;
            --text: #fff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --accent-gold: #FFE699;
            --text-mid: rgba(255, 255, 255, 0.6);
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* --- Backdrop Wall --- */
        .backdrop-wall {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
        }

        .backdrop-row {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            will-change: transform;
        }

        .backdrop-cell {
            flex-shrink: 0;
            overflow: hidden;
        }

        .backdrop-cell img {
            width: 320px;
            height: 180px;
            object-fit: cover;
            display: block;
            opacity: 0.9;
        }

        /* Dark overlay */
        .backdrop-wall-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.65) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* --- Nav --- */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            height: 26px;
            opacity: 0.9;
        }

        .lang-toggle {
            display: flex;
            gap: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
        }

        .lang-btn {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.2s;
            font-family: inherit;
        }

        .lang-btn.active {
            color: var(--text);
            background: rgba(255, 255, 255, 0.08);
        }

        .lang-btn:hover:not(.active) {
            color: var(--text-mid);
        }

        /* --- Hero --- */
        .hero {
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 24px;
            position: relative;
            z-index: 10;
        }

        .hero-statement {
            font-size: clamp(1.8rem, 4.2vw, 3.5rem);
            font-weight: 800;
            letter-spacing: 0.03em;
            line-height: 1.3;
            white-space: nowrap;
            text-transform: uppercase;
            margin-bottom: 32px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.7), 0 4px 40px rgba(0,0,0,0.5);
        }

        .hero-statement .dim {
            color: var(--accent-gold);
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
        }

        .store-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text);
            text-decoration: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.01em;
            transition: all 0.25s ease;
            text-shadow: none;
        }

        .store-btn:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .store-btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .store-btn.coming-soon {
            opacity: 0.45;
            cursor: default;
            pointer-events: none;
        }


        /* --- Footer --- */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 50;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.02em;
        }

        footer a {
            color: var(--text-dim);
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--text-mid);
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-contact a {
            color: var(--text-dim);
        }

        .footer-aside {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #e53e3e;
        }

        /* --- Mobile --- */
        @media (max-width: 600px) {

            }

            }

            }

                height: 112px;
            }

            footer {
                flex-direction: column;
                gap: 8px;
                padding: 16px 20px;
                text-align: center;
            }
        }
    </style>

    <script>
        // --- Language ---
        let currentLang = 'en';

        function setLang(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            document.querySelectorAll('[data-en]').forEach(el => {
                const text = el.getAttribute('data-' + lang);
                el.textContent = text;
            });

            document.title = 'Scènes. Movies. Series. Books.';
        }

        setLang('en');

        // --- Scroll-driven backdrop slide ---
        const rows = document.querySelectorAll('.backdrop-row');
        let scrollPos = 0;
        let targetScrollPos = 0;

        // Center rows initially
        rows.forEach(row => {
            const totalWidth = row.scrollWidth;
            const offset = -(totalWidth - window.innerWidth) / 2;
            row._offset = offset;
            row._currentOffset = offset;
            row.style.transform = `translateX(${offset}px)`;
        });

        // Listen for wheel / trackpad
        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            targetScrollPos += e.deltaY;
        }, { passive: false });

        // Touch support
        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            const deltaY = touchStartY - e.touches[0].clientY;
            touchStartY = e.touches[0].clientY;
            targetScrollPos += deltaY * 2;
        }, { passive: true });

        // Smooth animation loop
        function animate() {
            scrollPos += (targetScrollPos - scrollPos) * 0.08;

            rows.forEach(row => {
                const speed = parseFloat(row.dataset.speed);
                const direction = parseFloat(row.dataset.direction);
                const shift = scrollPos * speed * direction * 0.5;
                const finalOffset = row._offset + shift;
                row.style.transform = `translateX(${finalOffset}px)`;
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
