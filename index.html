<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scènes — Votre journal culturel</title>
    <meta name="description" content="Scènes — Notez, partagez et explorez films, séries et livres. Votre journal culturel personnel.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #13121A;
            --accent-gold: #F5E6C8;
            --accent-purple: #b07aff;
            --text-primary: #F5F5F5;
            --text-secondary: #9A9A9A;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Lang toggle */
        .lang-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 0;
            border: 1px solid rgba(176, 122, 255, 0.3);
            border-radius: 8px;
            overflow: hidden;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(19, 18, 26, 0.7);
        }

        .lang-btn {
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .lang-btn.active {
            background: var(--accent-purple);
            color: #fff;
        }

        .lang-btn:hover:not(.active) {
            color: var(--text-primary);
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 99;
            padding: 16px 24px;
            pointer-events: none;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }

        .navbar-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
        }

        .navbar-title {
            font-size: 1.15rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Hero */
        .hero {
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 24px 60px;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(176, 122, 255, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }



        .hero .tagline {
            font-size: clamp(1.1rem, 2.5vw, 1.35rem);
            color: var(--text-secondary);
            max-width: 480px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .app-store-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: var(--text-primary);
            color: var(--bg-primary);
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .app-store-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 245, 245, 0.15);
        }

        .app-store-btn svg {
            width: 22px;
            height: 22px;
        }

        /* Features */
        .features {
            padding: 80px 24px 100px;
            max-width: 960px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        @media (max-width: 640px) {
            .features-grid {
                grid-template-columns: 1fr;
            }
        }

        .feature-card {
            background: var(--bg-secondary);
            border: 1px solid rgba(176, 122, 255, 0.1);
            border-radius: 16px;
            padding: 32px 28px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            opacity: 0;
            transform: translateY(24px);
        }

        .feature-card.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.3s ease;
        }

        .feature-card:hover {
            border-color: rgba(176, 122, 255, 0.3);
            transform: translateY(-4px);
        }

        .feature-card.visible:hover {
            transform: translateY(-4px);
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 16px;
            display: block;
        }

        .feature-card h3 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--accent-gold);
        }

        .feature-card p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.55;
        }

        /* Hero screenshot */
        .hero-screenshot {
            position: relative;
            width: 240px;
            margin-bottom: 36px;
            border-radius: 12px;
            display: block;
            mask-image: linear-gradient(to bottom, #000 70%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, #000 70%, transparent 100%);
        }

        @media (max-width: 640px) {
            .hero-screenshot {
                width: 200px;
                margin-bottom: 28px;
            }
        }

        /* Showcase */
        .showcase {
            padding: 40px 0 80px;
            overflow: hidden;
        }

        .showcase-title {
            font-size: clamp(1.5rem, 3vw, 2rem);
            font-weight: 700;
            text-align: center;
            margin-bottom: 40px;
            color: var(--text-primary);
        }

        .showcase-scroll {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 0 max(24px, calc((100vw - 960px) / 2));
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .showcase-scroll::-webkit-scrollbar {
            display: none;
        }

        .phone-frame {
            flex: 0 0 auto;
            width: 220px;
            scroll-snap-align: center;
            text-align: center;
            opacity: 0;
            transform: translateY(24px);
        }

        .phone-frame.visible {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .phone-frame img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            mask-image: linear-gradient(to bottom, #000 75%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, #000 75%, transparent 100%);
        }

        .phone-label {
            display: block;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        @media (max-width: 640px) {
            .phone-frame {
                width: 180px;
            }
        }

        /* Footer */
        footer {
            border-top: 1px solid rgba(176, 122, 255, 0.1);
            padding: 40px 24px;
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: var(--accent-purple);
        }

        .footer-contact {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .footer-contact a {
            color: var(--accent-purple);
            text-decoration: none;
        }

        .footer-contact a:hover {
            text-decoration: underline;
        }
    </style>
</head>

    <script>
        // i18n
        let currentLang = 'fr';

        function setLang(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            document.querySelectorAll('[data-fr]').forEach(el => {
                const text = el.getAttribute('data-' + lang);
                if (el.tagName === 'A' || el.tagName === 'BUTTON') {
                    // For links/buttons, preserve children (like SVGs)
                    const children = Array.from(el.children);
                    el.textContent = text;
                    children.forEach(child => el.prepend(child));
                } else {
                    el.textContent = text;
                }
            });

            // Update page title
            document.title = lang === 'fr'
                ? 'Scènes — Votre journal culturel'
                : 'Scènes — Your cultural journal';
        }

        // Init text
        setLang('fr');

        // Scroll fade-in
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.feature-card').forEach((card, i) => {
            card.style.transitionDelay = `${i * 0.1}s`;
            observer.observe(card);
        });

        document.querySelectorAll('.phone-frame').forEach((frame, i) => {
            frame.style.transitionDelay = `${i * 0.12}s`;
            observer.observe(frame);
        });
    </script>
</body>
</html>
